name: Library Checker Cron

on:
  schedule:
    - cron: '*/5 * * * *' # Automatically runs every 5 minutes
  workflow_dispatch: # Allows you to force run it manually with a click

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Scraper Script
      run: python scraper.py
